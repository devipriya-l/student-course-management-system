<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>LMS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* Highlight the active page in the navbar */
        .navbar .nav-link.active {
            color: #0d6efd !important;
            font-weight: 600;
            border-bottom: 2px solid #0d6efd;
        }

        /* Subtle hover effect */
        .navbar .nav-link:hover {
            color: #66b2ff !important;
            transition: color 0.2s ease-in-out;
        }

        /* Adjust logout button alignment */
        .logout-btn {
            font-size: 1rem;
            text-decoration: none;
            color: #ffffff;
            border: none;
            background: none;
            margin-left: 10px;
        }

        .logout-btn:hover {
            color: #ff6666;
            text-decoration: underline;
        }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container-fluid">
    <a class="navbar-brand fw-bold" href="{% url 'dashboard' %}">LMS</a>

    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
            aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navbarNav">
      <!-- Left side links -->
      <ul class="navbar-nav me-auto">
        <li class="nav-item">
          <a class="nav-link {% if request.path == '/' %}active{% endif %}" href="{% url 'dashboard' %}">Dashboard</a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if '/courses' in request.path %}active{% endif %}" href="{% url 'course-list' %}">Courses</a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if '/students' in request.path %}active{% endif %}" href="{% url 'student-list' %}">Students</a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if '/instructors' in request.path %}active{% endif %}" href="{% url 'instructor-list' %}">Instructors</a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if '/enrollments' in request.path %}active{% endif %}" href="{% url 'enrollment-list' %}">Enrollments</a>
        </li>
      </ul>

      <!-- Right side: Login / Logout -->
      <ul class="navbar-nav ms-auto">
        {% if user.is_authenticated %}
          <li class="nav-item">
            <span class="nav-link text-white">Hello, {{ user.username }}</span>
          </li>
          <li class="nav-item d-flex align-items-center">
            <form action="{% url 'logout' %}" method="post" class="m-0 p-0">
              {% csrf_token %}
              <button type="submit" class="logout-btn">Logout</button>
            </form>
          </li>
        {% else %}
          <li class="nav-item">
            <a class="nav-link {% if '/login' in request.path %}active{% endif %}" href="{% url 'login' %}">Login</a>
          </li>
        {% endif %}
      </ul>
    </div>
  </div>
</nav>

<div class="container mt-4">
    {% block content %}
    {% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
