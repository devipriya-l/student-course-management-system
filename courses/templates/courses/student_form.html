{% extends 'courses/base.html' %}
{% load widget_tweaks %}

{% block content %}
<div class="container d-flex justify-content-center mt-5 mb-5">
  <div class="card shadow-sm border-0 p-4" style="max-width: 600px; width: 100%;">
    <h3 class="fw-bold text-center mb-4">
      {% if form.instance.pk %}✏️ Edit Student{% else %}➕ Add Student{% endif %}
    </h3>

    <form method="post" novalidate>
      {% csrf_token %}

      <!-- Student Name -->
      <div class="mb-3">
        <label for="id_name" class="form-label fw-semibold">Full Name</label>
        {{ form.name|add_class:"form-control" }}
      </div>

      <!-- Email -->
      <div class="mb-4">
        <label for="id_email" class="form-label fw-semibold">Email</label>
        {{ form.email|add_class:"form-control" }}
      </div>

      <!-- Buttons -->
      <div class="d-flex justify-content-between">
        <a href="{% url 'student-list' %}" class="btn btn-secondary px-4">
          ← Back to List
        </a>
        <button type="submit" class="btn btn-primary px-4">
          {% if form.instance.pk %}💾 Update{% else %}💾 Save{% endif %}
        </button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
