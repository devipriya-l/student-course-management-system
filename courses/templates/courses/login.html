{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | LMS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f7f9fc;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }
        .login-card {
            background: white;
            padding: 2.5rem;
            border-radius: 1rem;
            box-shadow: 0 6px 20px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
        }
        .btn-primary {
            width: 100%;
            box-shadow: 0 4px 10px rgba(13,110,253,0.3);
            font-weight: 600;
            border-radius: 0.75rem;
        }
        .form-control {
            border-radius: 0.75rem;
            padding: 10px;
        }
        .form-label {
            font-weight: 500;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <h3 class="text-center mb-4 fw-bold">🔐 LMS Login</h3>

        <form method="post" novalidate>
            {% csrf_token %}
            <div class="mb-3">
                <label for="id_username" class="form-label">Username</label>
                <input type="text" name="username" id="id_username" class="form-control" required autofocus>
            </div>
            <div class="mb-3">
                <label for="id_password" class="form-label">Password</label>
                <input type="password" name="password" id="id_password" class="form-control" required>
            </div>

            <button type="submit" class="btn btn-primary mt-2">Login</button>
        </form>

        {% if form.errors %}
            <p class="text-danger mt-3 text-center">Invalid username or password</p>
        {% endif %}

        <p class="text-center mt-4 text-muted small">
            You can only add/edit after login. Viewing is open to all.
        </p>
    </div>
</body>
</html>
